<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Broken Truth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- LOBBY -->
  <div id="lobby">
    <h1>Broken Truth</h1>

    <input id="nameInput" placeholder="Nick" />
    <input id="roomInput" placeholder="Room ID" />

    <button id="createBtn">Create Room (Host)</button>
    <button id="joinBtn">Join Room</button>

    <p id="roleInfo"></p>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <h2 id="questionText"></h2>

    <div id="options"></div>

    <p id="status"></p>
  </div>

  <!-- RESULTS -->
  <div id="results" class="hidden">
    <h2>Wyniki</h2>
    <div id="scoreboard"></div>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
